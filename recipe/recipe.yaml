schema_version: 1

context:
  name: voyageai
  version: "0.3.7"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/voyageai-${{ version }}.tar.gz
  sha256: 826cd97f97223f42b5babc5c459c9c80f3a8215ce5c0e007b0b276550f790d24

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - ffmpeg-python
    - langchain-text-splitters >=0.3.8
    - pillow
    - pydantic >=1.10.8
    - tokenizers >=0.14.0
    - python >=${{ python_min }},<3.13
    - requests
    - aiohttp
    - tenacity
    - numpy
    - aiolimiter

tests:
  - python:
      imports:
        - voyageai
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Vectorize your data to gear up your AI stack
  license: MIT
  license_file: LICENSE
  homepage: https://www.voyageai.com

extra:
  recipe-maintainers:
    - jan-janssen
